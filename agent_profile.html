<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f6fb;
padding:30px;
}

/* Profile Card */

.container{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
color:#1d2671;
}

/* Profile Image */

.profile-img{
display:flex;
justify-content:center;
margin-bottom:20px;
}

.profile-img img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #1d2671;
object-fit:cover;
}

/* Form Grid */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.full{
grid-column:span 2;
}

label{
font-size:13px;
font-weight:500;
}

input{
width:100%;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

/* Buttons */

button{
margin-top:20px;
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#1d2671,#c33764);
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

<h2>👤 Agent Profile</h2>

<div class="profile-img">
<img src="logo.png" id="profilePic">
</div>

<div class="form-grid">

<div>
<label>Agent ID</label>
<input type="text" id="agentId" value="AG102" readonly>
</div>

<div>
<label>Name</label>
<input type="text" id="name" value="Rahul Sharma">
</div>

<div>
<label>Mobile Number</label>
<input type="text" id="mobile" value="9876543210">
</div>

<div>
<label>Email</label>
<input type="email" id="email" value="agent@email.com">
</div>

<div class="full">
<label>Office Address</label>
<input type="text" id="address" value="Post Office Branch, Mumbai">
</div>

<div>
<label>Joining Date</label>
<input type="date" id="joiningDate" value="2023-01-01">
</div>

<div>
<label>Upload Profile Photo</label>
<input type="file" id="uploadPhoto" onchange="previewPhoto(event)">
</div>

</div>

<button onclick="updateProfile()">Update Profile</button>

</div>

<script>

function previewPhoto(event){
const file=event.target.files[0];
if(file){
document.getElementById("profilePic").src=URL.createObjectURL(file);
}
}

function updateProfile(){
alert("Profile Updated Successfully (Demo)");
}

</script>

</body>
</html>
