<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View RD Account Details</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f6fb;
padding:30px;
}

/* Main Card */

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
color:#1d2671;
}

/* Search */

.search-box{
display:flex;
gap:10px;
margin-bottom:20px;
}

.search-box input{
flex:1;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.search-box button{
padding:10px 20px;
border:none;
background:#0072ff;
color:white;
border-radius:6px;
cursor:pointer;
}

/* Info Grid */

.info-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:10px;
}

.info{
background:#f8f9ff;
padding:10px;
border-radius:6px;
}

.info label{
font-size:12px;
color:gray;
display:block;
}

.info span{
font-weight:600;
}

.info input{
width:100%;
padding:8px;
border:1px solid #dcdcdc;
border-radius:6px;
font-weight:600;
}

/* Table */

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

table th, table td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

table th{
background:#1d2671;
color:white;
}

.secondary-btn{
margin-top:20px;
padding:10px 20px;
border:none;
background:#4a5568;
color:white;
border-radius:6px;
cursor:pointer;
}

.action-btn{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
}

.update-btn{
background:#0072ff;
margin-right:8px;
}

.delete-btn{
background:#d64545;
}

#statusMsg{
margin-top:15px;
font-weight:600;
}

</style>
</head>

<body>

<div class="container">

<h2>📋 View RD Account Details</h2>

<div class="search-box">
<input type="text" id="searchAccount" placeholder="Enter Account Number or Customer ID">
<button onclick="searchAccount()">Search</button>
</div>

<!-- Account Info -->

<div class="info-grid">

<div class="info">
<label>Customer ID</label>
<input type="text" id="customerId" value="">
</div>

<div class="info">
<label>Name</label>
<input type="text" id="name" value="">
</div>

<div class="info">
<label>Mobile</label>
<input type="text" id="mobile" value="">
</div>

<div class="info">
<label>Aadhar</label>
<input type="text" id="aadhar" value="">
</div>

<div class="info">
<label>Account No</label>
<input type="text" id="accountNo" value="">
</div>

<div class="info">
<label>Agent ID</label>
<input type="text" id="agentId" value="">
</div>

<div class="info">
<label>Monthly Deposit</label>
<input type="number" id="monthlyAmount" value="">
</div>

<div class="info">
<label>Duration</label>
<input type="number" id="duration" value="">
</div>

<div class="info">
<label>Start Date</label>
<input type="date" id="startDate" value="">
</div>

<div class="info">
<label>Maturity Date</label>
<input type="date" id="maturityDate" value="">
</div>

<div class="info">
<label>Maturity Amount</label>
<input type="number" id="maturityAmount" value="">
</div>

<div class="info" style="grid-column: span 2;">
<label>Address</label>
<input type="text" id="address" value="">
</div>

</div>

<!-- Installment Table -->

<h3 style="margin-top:25px;">Installment History</h3>

<table>

<thead>
<tr>
<th>Month</th>
<th>Deposit Date</th>
<th>Amount</th>
<th>Status</th>
</tr>
</thead>

<tbody id="installmentTable">

<tr>
<td colspan="4">No Data</td>
</tr>

</tbody>

</table>

<div>
<button class="action-btn update-btn" onclick="updateAccount()">Update Account</button>
<button class="action-btn delete-btn" onclick="deleteAccount()">Delete Account</button>
</div>

<div id="statusMsg"></div>

<button class="secondary-btn" onclick="goToDashboard()">Back to Dashboard</button>

</div>

<script>

let selectedAccountNo = "";
const DASHBOARD_ROUTE = "{{ url_for('dashboard') }}";

function goToDashboard() {
	window.location.href = DASHBOARD_ROUTE;
}

function showStatus(message, isError) {
	const status = document.getElementById("statusMsg");
	status.style.color = isError ? "#d64545" : "#1d2671";
	status.textContent = message;
}

function fillAccountForm(account) {
	document.getElementById("customerId").value = account.customerId || "";
	document.getElementById("name").value = account.name || "";
	document.getElementById("mobile").value = account.mobile || "";
	document.getElementById("aadhar").value = account.aadhar || "";
	document.getElementById("accountNo").value = account.accountNo || "";
	document.getElementById("agentId").value = account.agentId || "";
	document.getElementById("monthlyAmount").value = account.monthlyAmount || "";
	document.getElementById("duration").value = account.duration || "";
	document.getElementById("startDate").value = account.startDate || "";
	document.getElementById("maturityDate").value = account.maturityDate || "";
	document.getElementById("maturityAmount").value = account.maturityAmount || "";
	document.getElementById("address").value = account.address || "";

	const installments = account.installments || [];
	if (!installments.length) {
		document.getElementById("installmentTable").innerHTML = `
		<tr><td colspan="4">No Installments Found</td></tr>`;
		return;
	}

	document.getElementById("installmentTable").innerHTML = installments.map((item) => `
		<tr>
			<td>${item.month || "-"}</td>
			<td>${item.depositDate || "-"}</td>
			<td>₹${item.amount || 0}</td>
			<td>${item.status || "-"}</td>
		</tr>
	`).join("");
}

function searchAccount(){

let acc=document.getElementById("searchAccount").value;

if(acc===""){
alert("Enter Account Number or Customer ID");
showStatus("Enter Account Number or Customer ID", true);
return;
}

fetch(`/api/accounts?query=${encodeURIComponent(acc)}`)
	.then(async (response) => {
		const result = await response.json();
		if (!response.ok || result.status !== "success") {
			throw new Error(result.message || "Failed to search account.");
		}

		if (!result.data.length) {
			throw new Error("No account found.");
		}

		const account = result.data[0];
		selectedAccountNo = account.accountNo;
		fillAccountForm(account);
		showStatus("Account loaded. You can now update or delete it.", false);
	})
	.catch((error) => {
		showStatus(error.message, true);
	});

}

function collectAccountFormData() {
	return {
		customerId: document.getElementById("customerId").value.trim(),
		name: document.getElementById("name").value.trim(),
		mobile: document.getElementById("mobile").value.trim(),
		aadhar: document.getElementById("aadhar").value.trim(),
		accountNo: document.getElementById("accountNo").value.trim(),
		agentId: document.getElementById("agentId").value.trim(),
		monthlyAmount: document.getElementById("monthlyAmount").value,
		duration: document.getElementById("duration").value,
		startDate: document.getElementById("startDate").value,
		maturityDate: document.getElementById("maturityDate").value,
		maturityAmount: document.getElementById("maturityAmount").value,
		address: document.getElementById("address").value.trim()
	};
}

function updateAccount() {
	if (!selectedAccountNo) {
		showStatus("Search and load an account before updating.", true);
		return;
	}

	const shouldUpdate = confirm("Are you sure you want to update this account?");
	if (!shouldUpdate) {
		return;
	}

	const payload = collectAccountFormData();

	fetch(`/api/accounts/${encodeURIComponent(selectedAccountNo)}`, {
		method: "PUT",
		headers: {
			"Content-Type": "application/json"
		},
		body: JSON.stringify(payload)
	})
		.then(async (response) => {
			const result = await response.json();
			if (!response.ok || result.status !== "success") {
				throw new Error(result.message || "Failed to update account.");
			}

			selectedAccountNo = result.data.accountNo;
			showStatus("Account updated successfully.", false);
			alert("Update successful.");
		})
		.catch((error) => {
			showStatus(error.message, true);
		});
}

function deleteAccount() {
	if (!selectedAccountNo) {
		showStatus("Search and load an account before deleting.", true);
		return;
	}

	const shouldDelete = confirm("Are you sure you want to delete this account?");
	if (!shouldDelete) {
		return;
	}

	fetch(`/api/accounts/${encodeURIComponent(selectedAccountNo)}`, {
		method: "DELETE"
	})
		.then(async (response) => {
			const result = await response.json();
			if (!response.ok || result.status !== "success") {
				throw new Error(result.message || "Failed to delete account.");
			}

			selectedAccountNo = "";
			document.querySelectorAll(".info input").forEach((input) => input.value = "");
			document.getElementById("installmentTable").innerHTML = '<tr><td colspan="4">No Data</td></tr>';
			showStatus("Account deleted successfully.", false);
			alert("Delete successful.");
		})
		.catch((error) => {
			showStatus(error.message, true);
		});

}

</script>

</body>
</html>
