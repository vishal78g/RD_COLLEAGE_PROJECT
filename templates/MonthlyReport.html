<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generate Monthly Report</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f6fb;
padding:30px;
}

/* Main Card */

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
color:#1d2671;
}

/* Filters */

.filters{
display:flex;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
}

.filters input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.filters button{
padding:8px 18px;
border:none;
background:#0072ff;
color:white;
border-radius:6px;
cursor:pointer;
}

/* Table */

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

table th, table td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

table th{
background:#1d2671;
color:white;
}

/* Total */

.total{
margin-top:15px;
font-weight:bold;
text-align:right;
}

/* Print Button */

.print-btn{
margin-top:15px;
background:#28a745;
}

.secondary-btn{
background:#4a5568;
}

#statusMsg{
margin-top:12px;
font-weight:600;
color:#1d2671;
}

</style>

</head>

<body>

<div class="container">

<h2>📊 Monthly RD Deposit Report</h2>

<div class="filters">

<label>Select Month</label>
<input type="month" id="reportMonth">

<button onclick="generateReport()">Generate Report</button>

<button class="print-btn" onclick="printReport()">Print Report</button>

<button class="secondary-btn" onclick="goToDashboard()">Back to Dashboard</button>

</div>

<table>

<thead>
<tr>
<th>Account No</th>
<th>Customer Name</th>
<th>Deposit Date</th>
<th>Amount</th>
<th>Agent ID</th>
</tr>
</thead>

<tbody id="reportTable">

<tr>
<td colspan="5">No Report Generated</td>
</tr>

</tbody>

</table>

<div class="total">
Total Deposit: ₹ <span id="totalAmount">0</span>
</div>

<div id="statusMsg"></div>

</div>

<script>
const DASHBOARD_ROUTE = "{{ url_for('dashboard') }}";

function goToDashboard() {
	window.location.href = DASHBOARD_ROUTE;
}

function setStatus(message, isError) {
	const status = document.getElementById("statusMsg");
	status.style.color = isError ? "#d64545" : "#1d2671";
	status.textContent = message;
}

function generateReport(){

let month=document.getElementById("reportMonth").value;

if(month===""){
setStatus("Please select month", true);
return;
}

fetch("/api/accounts")
	.then(async (response) => {
		const result = await response.json();
		if (!response.ok || result.status !== "success") {
			throw new Error(result.message || "Failed to load accounts.");
		}

		const reportRows = [];
		result.data.forEach((account) => {
			const installments = account.installments || [];
			installments.forEach((item) => {
				if ((item.month || "").startsWith(month)) {
					reportRows.push({
						acc: account.accountNo,
						name: account.name,
						date: item.depositDate || "-",
						amount: Number(item.amount || 0),
						agent: account.agentId || "-"
					});
				}
			});
		});

		if (!reportRows.length) {
			document.getElementById("reportTable").innerHTML = '<tr><td colspan="5">No deposits found for selected month</td></tr>';
			document.getElementById("totalAmount").textContent = 0;
			setStatus("No records found for the selected month.", false);
			return;
		}

		let table = "";
		let total = 0;

		reportRows.forEach((d) => {
			table += `
			<tr>
			<td>${d.acc}</td>
			<td>${d.name}</td>
			<td>${d.date}</td>
			<td>₹${d.amount}</td>
			<td>${d.agent}</td>
			</tr>
			`;
			total += d.amount;
		});

		document.getElementById("reportTable").innerHTML = table;
		document.getElementById("totalAmount").textContent = total;
		setStatus(`Report generated with ${reportRows.length} record(s).`, false);
	})
	.catch((error) => {
		document.getElementById("reportTable").innerHTML = '<tr><td colspan="5">Failed to generate report</td></tr>';
		document.getElementById("totalAmount").textContent = 0;
		setStatus(error.message, true);
	});

}

function printReport(){
window.print();
}

</script>

</body>
</html>
