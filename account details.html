<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View RD Account Details</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f6fb;
padding:30px;
}

/* Main Card */

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
color:#1d2671;
}

/* Search */

.search-box{
display:flex;
gap:10px;
margin-bottom:20px;
}

.search-box input{
flex:1;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.search-box button{
padding:10px 20px;
border:none;
background:#0072ff;
color:white;
border-radius:6px;
cursor:pointer;
}

/* Info Grid */

.info-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:10px;
}

.info{
background:#f8f9ff;
padding:10px;
border-radius:6px;
}

.info label{
font-size:12px;
color:gray;
display:block;
}

.info span{
font-weight:600;
}

/* Table */

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

table th, table td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

table th{
background:#1d2671;
color:white;
}

</style>
</head>

<body>

<div class="container">

<h2>📋 View RD Account Details</h2>

<div class="search-box">
<input type="text" id="searchAccount" placeholder="Enter Account Number or Customer ID">
<button onclick="searchAccount()">Search</button>
</div>

<!-- Account Info -->

<div class="info-grid">

<div class="info">
<label>Customer ID</label>
<span id="customerId">-</span>
</div>

<div class="info">
<label>Name</label>
<span id="name">-</span>
</div>

<div class="info">
<label>Mobile</label>
<span id="mobile">-</span>
</div>

<div class="info">
<label>Aadhar</label>
<span id="aadhar">-</span>
</div>

<div class="info">
<label>Account No</label>
<span id="accountNo">-</span>
</div>

<div class="info">
<label>Agent ID</label>
<span id="agentId">-</span>
</div>

<div class="info">
<label>Monthly Deposit</label>
<span id="monthlyAmount">-</span>
</div>

<div class="info">
<label>Duration</label>
<span id="duration">-</span>
</div>

<div class="info">
<label>Start Date</label>
<span id="startDate">-</span>
</div>

<div class="info">
<label>Maturity Date</label>
<span id="maturityDate">-</span>
</div>

<div class="info">
<label>Maturity Amount</label>
<span id="maturityAmount">-</span>
</div>

</div>

<!-- Installment Table -->

<h3 style="margin-top:25px;">Installment History</h3>

<table>

<thead>
<tr>
<th>Month</th>
<th>Deposit Date</th>
<th>Amount</th>
<th>Status</th>
</tr>
</thead>

<tbody id="installmentTable">

<tr>
<td colspan="4">No Data</td>
</tr>

</tbody>

</table>

</div>

<script>

/* Demo Search */

function searchAccount(){

let acc=document.getElementById("searchAccount").value;

if(acc===""){
alert("Enter Account Number or Customer ID");
return;
}

/* Demo Data */

document.getElementById("customerId").textContent="C102";
document.getElementById("name").textContent="Rahul Sharma";
document.getElementById("mobile").textContent="9876543210";
document.getElementById("aadhar").textContent="1234 5678 9012";
document.getElementById("accountNo").textContent="RD20240101";
document.getElementById("agentId").textContent="AG102";
document.getElementById("monthlyAmount").textContent="₹1000";
document.getElementById("duration").textContent="60 Months";
document.getElementById("startDate").textContent="01-01-2024";
document.getElementById("maturityDate").textContent="01-01-2029";
document.getElementById("maturityAmount").textContent="₹72,000";

/* Installment Table */

document.getElementById("installmentTable").innerHTML=`

<tr>
<td>Jan 2024</td>
<td>05-01-2024</td>
<td>₹1000</td>
<td>Paid</td>
</tr>

<tr>
<td>Feb 2024</td>
<td>05-02-2024</td>
<td>₹1000</td>
<td>Paid</td>
</tr>

<tr>
<td>Mar 2024</td>
<td>-</td>
<td>₹1000</td>
<td style="color:red;">Pending</td>
</tr>

`;

alert("Account Found (Demo Data)");

}

</script>

</body>
</html>
